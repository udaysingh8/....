<!DOCTYPE html>
<html>
<head>
    <title>A Special Letter For You</title>
    <style>
        body { background: #ffe3e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Signika', sans-serif; }
        .letter-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 80%; }
        p { font-size: 24px; color: #ff2a5f; margin-bottom: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="letter-box">
        <p>Today is... as beautiful as other days</p>
        <p>Today is just special, so special to you</p>
        <p>I made all this as a birthday present to you</p>
        <p>A very happy birthday, Chomuu! 🥳</p>
        <button onclick="window.history.back()" style="padding: 10px 20px; background: #ff2a5f; color: white; border: none; border-radius: 5px;">Back</button>
    </div>
</body>
</html>
