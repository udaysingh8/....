<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<title>Happy Birthday</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link href="https://fonts.googleapis.com/css?family=Signika:400,300,600,700" rel="stylesheet" type="text/css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/css/bootstrap.min.css">
	<link rel="stylesheet" href="loading.css?v=13.13">
	<link rel="stylesheet" href="stylesheet.css?v=13.13">

	<style>
		/* Background ko hamesha soft cute pink patterns me rakhne ke liye */
		body.peach, body.peach-after, body {
			background: #ffe3e8 !important; 
			background-image: radial-gradient(#ffb6c1 10%, transparent 10%), radial-gradient(#ffb6c1 10%, transparent 10%) !important;
			background-size: 30px 30px !important;
			background-position: 0 0, 15px 15px !important;
		}

		/* Magical Celebration Section Container */
		.magic-celebration-zone {
			display: none;
			position: fixed;
			top: 45%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 90%;
			max-width: 450px;
			text-align: center;
			z-index: 999;
		}

		/* Celebration video/gif display style */
		.celebration-media {
			width: 100%;
			max-height: 280px;
			object-fit: contain;
			border-radius: 20px;
			box-shadow: 0 15px 35px rgba(255, 42, 95, 0.25);
			background: rgba(255, 255, 255, 0.4);
			padding: 8px;
		}

		/* Grand Interactive Letter Button */
		.btn-grand-letter {
			display: inline-block;
			margin-top: 35px;
			background: linear-gradient(135deg, #ff2a5f, #ff6b8b);
			color: white !important;
			font-family: 'Signika', sans-serif;
			font-size: 22px;
			font-weight: 600;
			padding: 14px 40px;
			border: none;
			border-radius: 50px;
			text-decoration: none !important;
			box-shadow: 0 8px 25px rgba(255, 42, 95, 0.4);
			animation: heartBeat 1.5s infinite;
			transition: transform 0.2s ease;
		}

		@keyframes heartBeat {
			0% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 42, 95, 0.4); }
			50% { transform: scale(1.06); box-shadow: 0 12px 30px rgba(255, 42, 95, 0.6); }
			100% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 42, 95, 0.4); }
		}

		/* Chhupa hua message block kyunki ab hum ise letter.html par dikhayenge */
		.message {
			display: none !important;
		}
	</style>
</head>

<body>
	<div class="loading"></div>

	<div class="magic-celebration-zone" id="grand-magic-box">
		<video class="celebration-media" autoplay loop muted playsinline>
			<source src="Celebration.mp4" type="video/mp4">
			<img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3A5ZXA1NXh0bXBnbW90Ymxhd3Z4ZzB0bTh3Z3ByM2ZkMms4eXN6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/I7sk7rR9f0L91D7S9D/giphy.gif">
		</video>
		<br>
		<a href="letter.html" class="btn-grand-letter">Open My Letter 💌</a>
	</div>

	<div class="container">
		<div class="row bulb-holder">
			<div class="col-xs-2"><div class="bulb" id="bulb_yellow"></div></div>
			<div class="col-xs-2"><div class="bulb" id="bulb_red"></div></div>
			<div class="col-xs-2"><div class="bulb" id="bulb_blue"></div></div>
			<div class="col-xs-2"><div class="bulb" id="bulb_green"></div></div>
			<div class="col-xs-2"><div class="bulb" id="bulb_pink"></div></div>
			<div class="col-xs-2"><div class="bulb" id="bulb_orange"></div></div>
		</div>

		<div class="row">
			<div class="col-md-12 text-center">
				<img src="bannar.png" onerror="this.src='https://i.postimg.co/N0M78Fm6/bannar.png'" class="bannar" alt="Birthday Banner">
			</div>
		</div>

		<div class="balloons" id="b1" style="display:none;"><img src="b1.png" onerror="this.src='https://i.postimg.co/gJ6Xb2p1/b1.png'"><h2>C</h2></div>
		<div class="balloons" id="b2" style="display:none;"><img src="b2.png" onerror="this.src='https://i.postimg.co/8CcXwYfL/b2.png'"><h2>H</h2></div>
		<div class="balloons" id="b3" style="display:none;"><img src="b3.png" onerror="this.src='https://i.postimg.co/7bZgqZ9C/b3.png'"><h2>O</h2></div>
		<div class="balloons" id="b4" style="display:none;"><img src="b4.png" onerror="this.src='https://i.postimg.co/JnHhV78X/b4.png'"><h2>M</h2></div>
		<div class="balloons" id="b5" style="display:none;"><img src="b5.png" onerror="this.src='https://i.postimg.co/YCDmXzZ0/b5.png'"><h2>U</h2></div>

		<div class="row cake-cover">
			<div class="col-md-12 text-center">
				<div class="cake-container">
					<div class="cake-premium">
						<div class="layer layer-top">
							<div class="icing"></div>
							<div class="drip drip1"></div>
							<div class="drip drip2"></div>
							<div class="drip drip3"></div>
						</div>
						<div class="layer layer-middle"></div>
						<div class="layer layer-bottom"></div>
						<div class="candle-premium">
							<div class="flame" id="cake-flame"></div>
						</div>
					</div>
					<div class="cake-stand"></div>
				</div>
			</div>
		</div>

		<div class="row message" style="display:none !important;">
			<div class="col-md-12"><p>Bypass</p></div>
		</div>

		<div class="navbar navbar-fixed-bottom">
			<div class="container-fluid">
				<div class="row">
					<div class="col-xs-12">
						<button class="btn btn-primary" id="turn_on">Turn On Lights</button>
						<button class="btn btn-primary" id="play" style="display:none;">Play Music</button>
						<button class="btn btn-primary" id="bannar_coming" style="display:none;">Let's Decorate</button>
						<button class="btn btn-primary" id="balloons_flying" style="display:none;">Fly With Balloons</button>
						<button class="btn btn-primary" id="cake_fadein" style="display:none;">Delicious Cake</button>
						<button class="btn btn-primary" id="light_candle" style="display:none;">Blow The Candle 🎂</button>
						<button class="btn btn-primary" id="wish_message" style="display:none;">Happy Birthday</button>
						<button class="btn btn-primary" id="story" style="display:none;"></button>
					</div>
				</div>
			</div>
		</div>
	</div>

	<audio class="song" controls loop preload="auto">
		<source src="hbd.mp3?v=12.12" type="audio/mpeg">
	</audio>

	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.1/js/bootstrap.min.js"></script>
	<script src="effect.js?v=12.12"></script>

	<script>
		$(document).ready(function(){
			// 1. Instant loading screen bypass controller
			setTimeout(function(){
				$('.loading').fadeOut('fast', function(){
					$('.container').fadeIn('slow');
				});
			}, 1200);

			// 2. Blow candle custom tracker
			$('#light_candle').click(function(){
				$('#cake-flame').hide(); 
			});

			// 3. MASTER STAGE OVERRIDE: Happy Birthday click karte hi grand celebration burst hoga
			$('#wish_message').unbind('click').click(function(){
				// Pehle saari bottom navbar buttons ko hide karo
				$('.navbar').fadeOut('slow');
				// Cake, guppare aur banner ko completely clean out karo
				$('.cake-cover').fadeOut('slow');
				$('.bannar').fadeOut('slow');
				$('.balloons').fadeOut('slow');
				
				// Ab magical box (Celebration.mp4 video and Letter button) ko trigger karo
				setTimeout(function(){
					$('#grand-magic-box').fadeIn('slow');
					// Video playback ko fully invoke karna mobile bypasses ke liye
					var videoEl = $('.celebration-media')[0];
					if(videoEl) {
						videoEl.play().catch(function(e){ console.log("Auto-play handle override"); });
					}
				}, 600);
			});
		});
	</script>
</body>
</html>
