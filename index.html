<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ----- BACKGROUND LAYER SYSTEM ----- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            transform: scale(1.05); /* Avoid white edges */
        }

        /* 1. INITIAL: Blurred Login Texture Background */
        #bgInitial {
            background-image: url('https://i.postimg.cc/0NkYDsvt/file-00000000a9f47209a4b281157b28b5df.png');
            z-index: 2;
            opacity: 1;
        }

        /* 2. SUCCESS: Unlocked Romantic Photo Background (Blurred Canvas) */
        #bgUnlocked {
            background-image: url('https://i.postimg.cc/ncrXthkK/file-00000000be48720b82f9741b5bb4fe2e.png');
            z-index: 1;
            opacity: 0; /* Initially Hidden */
            filter: blur(8px); /* Kept blurred initially for focus on button */
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), filter 1.5s ease;
        }

        /* Unblur logic when unlocked */
        #bgUnlocked.loaded {
            opacity: 1;
            filter: blur(0px); /* Transition to sharp personalized photo */
        }

        /* ----- GLASSMORPHIC LOGIN BOX ----- */
        .lock-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 40px 30px;
            width: 85%;
            max-width: 340px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
        }

        /* Unlocked box state (becomes more transparent) */
        .lock-box.unlocked {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        .lock-box h2 {
            color: #2b2d42;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .lock-box .hint {
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 22px;
            font-weight: 500;
        }
        
        .lock-box input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe5ec;
            background: #fff;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            text-align: center;
            color: #333;
            margin-bottom: 18px;
            transition: border-color 0.3s;
        }

        .lock-box input:focus {
            border-color: #ff4d6d;
        }

        .btn {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Standard Enter Button */
        .enter-btn {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        /* Crystal Clear Premium Start Button */
        .start-btn {
            background: rgba(255, 255, 255, 1);
            color: #ff4d6d;
            font-weight: 800;
            font-size: 17px;
            letter-spacing: 1px;
            box-shadow: 0 8px 30px rgba(255, 77, 109, 0.5);
            display: none; /* Initially Hidden */
            text-decoration: none;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="bg-layer" id="bgInitial"></div>
    <div class="bg-layer" id="bgUnlocked"></div>

    <div class="lock-box" id="lockBox">
        <h2 id="lockHeading">Password please</h2>
        <div class="hint" id="lockHint">HINT: What's your name?</div>
        
        <input type="text" id="passwordInput" placeholder="Type here..." autocomplete="off">
        <button class="btn enter-btn" id="enterBtn">Enter</button>

        <a href="celebration.html" class="btn start-btn" id="startBtn">START 🚀</a>
    </div>

    <script>
        const CORRECT_NAME = "Chomu"; 
        const wrongAnswersList = [
            "Bhondu sahi naam likho! 😤",
            "Ap apna name bhul gya betu🥺?",
            "Wrong password kuchupuchu! ❌",
            "Sahi naam dalo varna gift noi milega 🎁"
        ];

        const enterBtn = document.getElementById('enterBtn');
        const passwordInput = document.getElementById('passwordInput');
        const startBtn = document.getElementById('startBtn');
        const lockHeading = document.getElementById('lockHeading');
        const lockHint = document.getElementById('lockHint');
        
        // Background Layers Setup
        const bgInitial = document.getElementById('bgInitial');
        const bgUnlocked = document.getElementById('bgUnlocked');
        const lockBox = document.getElementById('lockBox');

        function checkPassword() {
            const userInput = passwordInput.value.trim().toLowerCase();
            
            if (userInput === CORRECT_NAME.toLowerCase()) {
                // 1. DYNAMIC BACKGROUND TRANSITION
                bgInitial.style.opacity = '0'; // Smoothly fade out textured bg
                bgUnlocked.classList.add('loaded'); // Smoothly unblur specialized photo bg
                
                // 2. BOX GLASSMORPHISM UPDATE
                lockBox.classList.add('unlocked');
                
                // 3. TEXT UPDATE
                lockHeading.innerText = "Yeeeeeeee chomuuuu! 🥰";
                lockHeading.style.color = "#ff4d6d";
                lockHint.innerText = "Congratulations babyyy jii... happppppppppy birthday mera bachuuu💋✨";
                lockHint.style.color = "#6c757d";
                
                // 4. ELEMENT VISIBILITY SWAP
                passwordInput.classList.add('hidden');
                enterBtn.classList.add('hidden');
                
                // SHOW Start Button
                startBtn.style.display = 'flex';
                
                // Bonus Flower Pop on success!
                setInterval(createFloatingEmoji, 450);

            } else {
                // Wrong password triggers
                const randomLine = wrongAnswersList[Math.floor(Math.random() * wrongAnswersList.length)];
                lockHeading.innerText = randomLine;
                lockHeading.style.color = "#d90429"; 
                lockHint.innerText = "Try again betu... 🤫";
                lockHint.style.color = "#d90429";
                passwordInput.style.borderColor = '#d90429';
                passwordInput.value = ''; 
            }
        }

        enterBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // Simple floating function on success (matches the feel of special photo background)
        const emojis = ['🌸', '💖', '✨', '🎈', '🤍'];
        function createFloatingEmoji() {
            if(bg unlocked.classList.contains('loaded')) { // only after login
                const emoji = document.createElement('div');
                emoji.style.position = 'absolute';
                emoji.style.pointerEvents = 'none';
                emoji.style.zIndex = '5';
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 100 + 'vw';
                emoji.style.fontSize = Math.random() * (26 - 15) + 15 + 'px';
                
                const duration = Math.random() * (6.5 - 4) + 4;
                emoji.style.bottom = '-50px';
                
                // Custom CSS animation inject variant safely
                emoji.style.animation = `floatUpAmbient ${duration}s linear forwards`;
                
                document.body.appendChild(emoji);
                setTimeout(() => { emoji.remove(); }, duration * 1000);
            }
        }

        // Ambient Sparkles CSS defined dynamically
        const styleNode = document.createElement('style');
        styleNode.innerHTML = `
            @keyframes floatUpAmbient {
                0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
                10% { opacity: 0.75; }
                100% { transform: translateY(-115vh) translateX(60px) rotate(360deg); opacity: 0; }
            }
        `;
        document.body.appendChild(styleNode);
    </script>
</body>
</html>
