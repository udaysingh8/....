<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            background-color: #ffe5ec;
        }

        /* ----- BACKGROUND LAYER SYSTEM ----- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            transform: scale(1.05); /* Avoid white edges */
        }

        /* 1. INITIAL: Blurred Login Texture Background */
        #bgInitial {
            background-image: url('https://i.postimg.cc/0NkYDsvt/file-00000000a9f47209a4b281157b28b5df.png');
            z-index: 2;
            opacity: 1;
        }

        /* 2. SUCCESS: Unlocked Image Background */
        #bgUnlocked {
            background-image: url('https://i.postimg.cc/ncrXthkK/file-00000000be48720b82f9741b5bb4fe2e.png');
            z-index: 1;
            opacity: 0;
        }

        /* ----- GLASSMORPHIC LOGIN BOX ----- */
        .lock-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 35px 25px;
            width: 85%;
            max-width: 340px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lock-box h2 {
            color: #2b2d42;
            font-size: 21px;
            margin-bottom: 8px;
            font-weight: 700;
            line-height: 1.3;
        }

        .lock-box .hint {
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 22px;
            font-weight: 500;
            line-height: 1.4;
        }
        
        .lock-box input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe5ec;
            background: #fff;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            text-align: center;
            color: #333;
            margin-bottom: 18px;
            transition: border-color 0.3s;
        }

        .lock-box input:focus {
            border-color: #ff4d6d;
        }

        .btn {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter-btn {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        /* Dark Premium Slate Button */
        .start-btn {
            background: #3a3b5c;
            color: #ffffff;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(58, 59, 92, 0.3);
            display: none; 
            text-decoration: none;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }

        /* ========================================================
           NEW CELEBRATION STYLES (LOADS ON START CLICK)
           ======================================================== */
        
        .celebration-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 15;
            font-family: 'Georgia', serif;
        }

        .celebration-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .header-container {
            text-align: center;
            margin-top: 40px;
        }

        .birthday-title {
            font-size: 38px;
            color: #b76e79;
            font-style: italic;
            font-weight: 400;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .name-heading {
            font-size: 55px;
            color: #7a303e;
            letter-spacing: 4px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .wish-text {
            font-size: 18px;
            color: #555;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* RED VELVET HEART CAKE */
        .cake-container {
            position: absolute;
            bottom: 18%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .heart-cake {
            position: relative;
            width: 240px;
            height: 150px;
            background: #a82c40; /* Red Velvet Core */
            border-radius: 120px / 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .heart-cake::before, .heart-cake::after {
            content: '';
            position: absolute;
            top: -20px;
            width: 130px;
            height: 130px;
            background: #912234;
            border-radius: 50%;
        }
