<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #ffe5ec;
            position: relative;
        }

        /* Full Screen Background Image with Blur */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.postimg.cc/0NkYDsvt/file-00000000a9f47209a4b281157b28b5df.png'); 
            background-size: cover;
            background-position: center;
            filter: blur(6px);
            z-index: 1;
            transform: scale(1.05); /* Prevents white edges from blur */
        }

        /* Glassmorphic Box Setup */
        .lock-box {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 40px 30px;
            width: 85%;
            max-width: 340px;
            border-radius: 28px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
        }

        .lock-box h2 {
            color: #2b2d42;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .lock-box .hint {
            color: #6c757d;
            font-size: 13px;
            margin-bottom: 22px;
            font-weight: 500;
        }
        
        .lock-box input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffe5ec;
            background: #fff;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            text-align: center;
            color: #333;
            margin-bottom: 18px;
            transition: border-color 0.3s;
        }

        .lock-box input:focus {
            border-color: #ff4d6d;
        }

        .btn {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter-btn {
            background: linear-gradient(135deg, #ff4d6d, #ff758f);
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        /* Premium Start Button Style (Screenshot ki tarah) */
        .start-btn {
            background: linear-gradient(135deg, #2b2d42, #4a4e69);
            box-shadow: 0 6px 20px rgba(43, 45, 110, 0.25);
            display: none;
            text-decoration: none;
            justify-content: center;
            align-items: center;
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="lock-box">
        <h2 id="lockHeading">Password please</h2>
        <div class="hint" id="lockHint">HINT: What's your name?</div>
        
        <input type="text" id="passwordInput" placeholder="Type here..." autocomplete="off">
        <button class="btn enter-btn" id="enterBtn">Enter</button>

        <a href="celebration.html" class="btn start-btn" id="startBtn">START 🚀</a>
    </div>

    <script>
        const CORRECT_NAME = "Chomu"; 
        const wrongAnswersList = [
            "Bhondu sahi naam likho! 😤",
            "Ap apna name bhul gya betu🥺?",
            "Wrong password kuchupuchu! ❌",
            "Sahi naam dalo varna gift noi milega 🎁"
        ];

        const enterBtn = document.getElementById('enterBtn');
        const passwordInput = document.getElementById('passwordInput');
        const startBtn = document.getElementById('startBtn');
        const lockHeading = document.getElementById('lockHeading');
        const lockHint = document.getElementById('lockHint');

        function checkPassword() {
            const userInput = passwordInput.value.trim().toLowerCase();
            
            if (userInput === CORRECT_NAME.toLowerCase()) {
                // Sahi password standard triggers
                lockHeading.innerText = "Welcome Back Betu! 🥰";
                lockHeading.style.color = "#ff4d6d";
                lockHint.innerText = "Everything is ready for you ✨";
                lockHint.style.color = "#6c757d";
                
                // Hide inputs and show Start Button
                passwordInput.classList.add('hidden');
                enterBtn.classList.add('hidden');
                
                startBtn.style.display = 'flex'; // Start button display logic
            } else {
                // Wrong password alerts
                const randomLine = wrongAnswersList[Math.floor(Math.random() * wrongAnswersList.length)];
                lockHeading.innerText = randomLine;
                lockHeading.style.color = "#d90429"; 
                lockHint.innerText = "Try again betu... 🤫";
                lockHint.style.color = "#d90429";
                passwordInput.style.borderColor = '#d90429';
                passwordInput.value = ''; 
            }
        }

        enterBtn.addEventListener('click', checkPassword);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
